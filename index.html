<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4A0A13" />
  <title>Under Maintenance - Beloved Kids Cito</title>
  <link rel="icon" type="image/x-icon" href="BK Cito.ico">
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --maroon:       #7B1120;
      --maroon-deep:  #4A0A13;
      --maroon-light: #C0394A;
      --gold:         #D4A017;
      --gold-light:   #F0C842;
      --cream:        #F5EDE6; 
      --white:        #FBF6F3;
      --text:         #2C1810;
      --text-muted:   #A07060;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Nunito', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* ---- BACKGROUND BUBBLES ---- */
    .bg-bubbles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-bubbles span {
      position: absolute; border-radius: 50%; opacity: 0.04;
      animation: floatBg 14s infinite ease-in-out;
    }
    .bg-bubbles span:nth-child(1) { width: 300px; height: 300px; background: var(--maroon); top: -80px; left: -80px; animation-delay: 0s; }
    .bg-bubbles span:nth-child(2) { width: 200px; height: 200px; background: var(--gold); top: 30%; right: -60px; animation-delay: 2.5s; }
    .bg-bubbles span:nth-child(3) { width: 150px; height: 150px; background: var(--maroon-light); bottom: 15%; left: 5%; animation-delay: 5s; }
    .bg-bubbles span:nth-child(4) { width: 240px; height: 240px; background: var(--gold); bottom: -60px; right: 15%; animation-delay: 1.2s; }
    
    @keyframes floatBg {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-28px) scale(1.05); }
    }

    /* ---- MAINTENANCE CARD ---- */
    .maintenance-card {
      position: relative;
      z-index: 10;
      background: var(--white);
      max-width: 440px;
      width: 100%;
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(74, 10, 19, 0.08);
      border: 1px solid rgba(123, 17, 32, 0.08);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .icon-wrap {
      width: 84px; height: 84px;
      margin: 0 auto 20px;
      background: linear-gradient(145deg, #FFF0F2, #FFE4E8);
      border: 2px solid rgba(123, 17, 32, 0.12);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 4px 16px rgba(123, 17, 32, 0.1);
      animation: bounce 2s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; color: var(--maroon-deep); margin-bottom: 12px; line-height: 1.2; }
    p { font-size: 0.95rem; color: var(--text-muted); font-weight: 600; line-height: 1.6; margin-bottom: 24px; }
    p strong { color: var(--maroon); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; min-height: 52px; border: none; border-radius: 14px; font-family: var(--font-body); font-size: 0.95rem; font-weight: 800; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(145deg, var(--maroon), var(--maroon-light)); color: white; box-shadow: 0 5px 18px rgba(123, 17, 32, 0.35); margin-bottom: 12px; }
    .btn-primary:hover { box-shadow: 0 8px 24px rgba(123, 17, 32, 0.45); transform: translateY(-2px); }
    .btn-ghost { background: #F8F0EC; color: var(--text-muted); border: 2px solid rgba(123, 17, 32, 0.10); }
    .btn-ghost:hover { background: #F0E4DC; border-color: rgba(123, 17, 32, 0.2); color: var(--maroon); }
    .footer-text { margin-top: 24px; font-size: 0.75rem; color: rgba(160, 112, 96, 0.6); font-weight: 700; letter-spacing: 0.5px; }

    @media (max-width: 480px) { .maintenance-card { padding: 32px 24px; } h1 { font-size: 1.5rem; } }

    /* ============================================================
       MASCOT PETEY PANDA (CHIBI PET)
       ============================================================ */
    .chibi-pet {
      position: fixed;
      bottom: 20px;
      left: calc(100vw - 150px);
      z-index: 9999;
      animation: floatPanda 4s ease-in-out infinite; 
      transition: left 0s linear; 
    }

    .chibi-pet img {
      width: 180px;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .chibi-pet img:hover {
      filter: drop-shadow(0 0 12px var(--gold-light)); 
    }

    @keyframes floatPanda {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    .bubble-chat {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: var(--maroon-deep);
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: var(--font-body);
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      box-shadow: 0 4px 12px rgba(74,10,19,0.15);
    }

    .bubble-chat::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px 5px 0;
      border-style: solid;
      border-color: var(--gold) transparent transparent transparent;
    }

    .chibi-pet:hover .bubble-chat { opacity: 1; }
    
    @media (max-width: 480px) { .chibi-pet { bottom: 15px; } .chibi-pet img { width: 150px; } }
  </style>
</head>
<body>

  <!-- Animasi Background -->
  <div class="bg-bubbles" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- Main Card -->
  <main class="maintenance-card">
    <div class="icon-wrap">🛠️</div>
    
    <h1>Lagi Beres-beres!</h1>
    
    <p>
      Sistem Absensi <strong>Beloved Kids Cito</strong> sedang dalam perbaikan rutin biar webnya makin <i>sat-set</i> dan nyaman dipake.
      <br><br>
      Tunggu sebentar ya, kita bakal balik lagi secepatnya!
    </p>

    <button class="btn btn-primary" onclick="window.location.reload()">
      🔄 Coba Muat Ulang
    </button>
    <a href="https://wa.me/+6285607671130" class="btn btn-ghost">
      📞 Hubungi Admin
    </a>

    <div class="footer-text">
      © 2026 Beloved Kids Cito
    </div>
  </main>

  <!-- Mascot Petey Panda -->
  <div class="chibi-pet">
    <img id="petey-panda" src="Idle.gif" alt="Petey Panda" />
    <div class="bubble-chat">Ngodingholic~ 🐼</div>
  </div>

  <script>
    /* ============================================================
       MASCOT INTERACTION & RANDOM HORIZONTAL WALK (MAINTENANCE THEME)
       ============================================================ */
    document.addEventListener('DOMContentLoaded', () => {
      const petContainer = document.querySelector('.chibi-pet');
      const pandaImg = document.getElementById('petey-panda');
      const bubbleChat = document.querySelector('.bubble-chat');
      
      if (pandaImg && petContainer) {
        const paddingX = 140; 
        let currentX = window.innerWidth - paddingX;
        petContainer.style.left = currentX + 'px';

        // 1. Interaksi saat diklik
        pandaImg.addEventListener('click', () => {
          pandaImg.src = 'Hit.gif'; 
          bubbleChat.innerHTML = 'Jangan diganggu woy! 🤕';
          setTimeout(() => {
            pandaImg.src = 'Idle.gif';
            bubbleChat.innerHTML = 'Ngodingholic~ 🐼';
          }, 600); 
        });

        // 2. Event jalan santai
        setInterval(() => {
          if (Math.random() < 0.4) {
            jalanHorizontal();
          }
        }, 15000);

        function jalanHorizontal() {
          const minX = 20;
          const maxX = window.innerWidth - paddingX;
          const targetX = Math.floor(Math.random() * (maxX - minX + 1)) + minX;
          
          if (Math.abs(targetX - currentX) < 60) return;

          const distance = Math.abs(targetX - currentX);
          const speed = 90; 
          const duration = distance / speed;

          petContainer.style.transition = `left ${duration}s linear`;
          pandaImg.src = 'Walk.gif';
          bubbleChat.innerHTML = 'Geser dikit, ngepel dulu~ 🚶‍♂️';

          if (targetX < currentX) {
            pandaImg.style.transform = 'scaleX(-1)';
          } else {
            pandaImg.style.transform = 'scaleX(1)';
          }

          currentX = targetX;
          petContainer.style.left = currentX + 'px';

          setTimeout(() => {
            pandaImg.src = 'Idle.gif';
            bubbleChat.innerHTML = 'Bantu nyapu server~ 🐼';
          }, duration * 1000);
        }
        
        window.addEventListener('resize', () => {
          const maxX = window.innerWidth - paddingX;
          if (currentX > maxX) {
            currentX = maxX;
            petContainer.style.left = currentX + 'px';
          }
        });
      }
    });
  </script>

</body>
</html>
